<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      line-height: 1.6;
      background-color: rgb(240, 240, 240);
      color: #24292e;
    }
    header {
      margin-bottom: 2rem;
      text-align: center;
    }
    header img {
      width: min(400px, 100%);
      display: inline-block;
    }
    h1 { color: rgb(30, 130, 30); }
    h2, strong { color: rgb(190, 40, 40); }
    a { color: rgb(190, 40, 40); }
    header a { text-decoration: none; }

    /* Dark mode */
    .logo-dark  { display: none; }
    .logo-light { display: inline-block; }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: rgb(3, 3, 3);
        color: #e0e0e0;
      }
      h1 { color: rgb(120, 220, 120); }
      h2, strong { color: rgb(230, 100, 100); }
      a { color: rgb(230, 100, 100); }
      .logo-light { display: none; }
      .logo-dark  { display: inline-block; }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ "/" | relative_url }}">
      <img class="logo-light" src="{{ "/pictures/logo-white.png" | relative_url }}" alt="{{ site.title }} logo">
      <img class="logo-dark"  src="{{ "/pictures/logo-black.png" | relative_url }}" alt="{{ site.title }} logo">
    </a>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
