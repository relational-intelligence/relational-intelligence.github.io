<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      line-height: 1.6;
      background-color: rgb(240, 240, 240);
      color: #24292e;
    }
    header {
      margin-bottom: 2rem;
    }
    header img {
      width: min(400px, 100%);
      display: block;
    }
    a { color: #0366d6; }
    header a {
      color: black;
      text-decoration: none;
    }
    header a h1 {
      text-decoration: underline;
    }

    /* Dark mode */
    .logo-dark  { display: none; }
    .logo-light { display: block; }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: rgb(3, 3, 3);
        color: #e0e0e0;
      }
      a { color: #58a6ff; }
      header a { color: #e0e0e0; }
      .logo-light { display: none; }
      .logo-dark  { display: block; }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ "/" | relative_url }}">
      <img class="logo-light" src="{{ "/logo-white.png" | relative_url }}" alt="{{ site.title }} logo">
      <img class="logo-dark"  src="{{ "/logo-black.png" | relative_url }}" alt="{{ site.title }} logo">
      <h1>{{ site.title }}</h1>
    </a>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
