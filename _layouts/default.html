<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      color: #24292e;
      line-height: 1.6;
    }
    header {
      margin-bottom: 2rem;
    }
    header img {
      max-height: 80px;
      display: block;
    }
    a { color: #0366d6; }
  </style>
</head>
<body>
  <header>
    <a href="{{ "/" | relative_url }}">
      {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" alt="{{ site.title }} logo">
      {% endif %}
      <h1>{{ site.title }}</h1>
    </a>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
